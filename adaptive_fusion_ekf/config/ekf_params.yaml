ekf_fusion_node:
  ros__parameters:
    use_sim_time: true

    mode: "fixed"
    world_frame: "map"
    odom_frame: "odom"
    base_frame: "base_footprint"

    uwb_topic: "/uwb/pose"
    slam_topic: "/slam/pose"
    imu_topic: "/imu"
    odom_topic: "/odom"

    fusion_pose_topic: "/fusion/pose"
    fusion_global_odom_topic: "/fusion/global_odom"
    fusion_odom_topic: "/fusion/odom"
    fusion_path_topic: "/fusion/path"
    debug_topic: "/fusion/debug"

    publish_global_pose: true
    publish_global_odom: true
    publish_local_odom: true
    publish_map_odom_tf: true

    path_publish_stride: 5
    path_max_length: 500
    use_measurement_covariance: true
    min_measurement_variance: 0.0001

    initial_covariance_x: 1.0
    initial_covariance_y: 1.0
    initial_covariance_theta: 0.5

    process_noise_x: 0.05
    process_noise_y: 0.05
    process_noise_theta: 0.02

    uwb_noise_x: 0.20
    uwb_noise_y: 0.20

    slam_noise_x: 0.05
    slam_noise_y: 0.05
    slam_noise_theta: 0.05

    imu_noise_theta: 0.03
